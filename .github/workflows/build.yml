name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pyinstaller
        run: pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller packaging/windows.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy
          path: |
            dist/TgWsProxy.exe

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_APK_NAME: tg-ws-proxy-android-${{ github.event.inputs.version }}.apk
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Android release signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Missing secret: ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing secret: ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing secret: ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing secret: ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Prepare Android release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-release.keystore"
          test -s "$RUNNER_TEMP/android-release.keystore"

      - name: Build Android release APK
        env:
          LOCAL_CHAQUOPY_REPO: ${{ github.workspace }}/android/.m2-chaquopy-ci
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/android-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew build-local-debug.sh
          ./build-local-debug.sh assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/$ANDROID_APK_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-android-release
          path: android/app/build/outputs/apk/release/${{ env.ANDROID_APK_NAME }}

  build-win7:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.8 (last version supporting Win7)
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: "pip"

      - name: Install dependencies (Win7-compatible)
        run: pip install -r requirements-win7.txt

      - name: Install pyinstaller
        run: pip install "pyinstaller==5.13.2"

      - name: Build EXE with PyInstaller (Win7)
        run: pyinstaller packaging/windows.spec --noconfirm

      - name: Rename artifact
        run: mv dist/TgWsProxy.exe dist/TgWsProxy-win7.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-win7
          path: dist/TgWsProxy-win7.exe

  release:
    needs: [build, build-win7, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download main build
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy
          path: dist

      - name: Download Win7 build
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy-win7
          path: dist

      - name: Download Android build
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy-android-release
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "TG WS Proxy ${{ github.event.inputs.version }}"
          body: |
            ## TG WS Proxy ${{ github.event.inputs.version }}
          files: |
            dist/TgWsProxy.exe
            dist/TgWsProxy-win7.exe
            dist/tg-ws-proxy-android-${{ github.event.inputs.version }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
